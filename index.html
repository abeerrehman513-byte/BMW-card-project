<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            border: 20px solid black;
            background-color: rgb(61, 98, 128);
            border-radius: 50px;
            padding: 70px;
            margin: 100px;
            box-shadow: 10px 10px 12px rgb(29, 94, 138);
            width: 50%;
        }
         .card:hover{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-transform: capitalize;
            color: white;
         }
         h1:hover{
            text-decoration: underline;
            cursor: grabbing;
         }
button{
    width: 120px;
    height: 80px;
    border-radius: 30px;
    font-size: 14pt;
    font-weight: bolder;
}
        button:hover {
            color: white;
            background: linear-gradient(45deg, rgb(68, 138, 230), white);
        }
        .flexi{
            display:flex;
        }
        .text{
            text-align: left;
            font-size: 18pt;
            margin-right: 20px;
        }
        img:hover{
           border-radius: 50%;
           cursor: grab;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="flexi">
            <div class="text">
            <h1>BMW</h1>
            <p>Experience the perfect blend of luxury, performance, and innovation with BMW. Designed for comfort and engineered for
            power, every BMW delivers an exceptional driving experience with advanced technology, premium interiors, and iconic
            styling.</p>
            <button>Explore BMW</button>
            </div>
            <div class="imgi">
            <img src="BMW🔥✨.jfif" alt=""width="200px">
            </div>
        </div>
    </div>
</body>

</html>
